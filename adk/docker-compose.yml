services:
  adk:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    command: >
      sh -c "uv sync --no-dev && uv run uvicorn app.main:app --host 0.0.0.0 --port 8081"
    ports:
      - "8081:8081"
    env_file:
      - .env
    volumes:
      - .:/app
      - copilot-tokens:/root/.config/litellm/github_copilot
    restart: unless-stopped

volumes:
  copilot-tokens:
